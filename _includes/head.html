<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
{% assign cp = site.cypherpunk %}
{% assign host = site.url | remove: 'https://' | remove: 'http://' | remove: 'www.' | default: 'localhost' %}
<style>:root { --terminal-prompt: "root@{{ host }}:~$ "; --hero-position: {{ cp.hero_position | default: "center top" }}; }</style>
{% if site.url %}<link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">{% endif %}
{% if site.favicon %}<link rel="icon" href="{{ site.favicon | relative_url }}" type="image/x-icon">{% endif %}
{% feed_meta %}
{% seo %}
